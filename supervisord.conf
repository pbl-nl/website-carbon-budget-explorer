[supervisord]
nodaemon=true

[program:gunicorn]
command=gunicorn --bind=0.0.0.0 --timeout 600 --workers=9 --keep-alive=5 --worker-class=gevent --preload ws:app
directory=/home/site/wwwroot
autostart=true
autorestart=true
stderr_logfile=/home/site/wwwroot/logs/gunicorn.err.log
stdout_logfile=/home/site/wwwroot/logs/gunicorn.out.log